#
# Shared topics for the r2ps platform.
#
# Per-pod response topics live with the workload that owns them
# (see apps/wallet-bff/topics.yaml).
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: r2ps-wallet-state
  labels:
    strimzi.io/cluster: access-kafka-cluster
spec:
  partitions: 10
  replicas: 3
  config:
    min.insync.replicas: 2
    retention.ms: -1
    cleanup.policy: compact
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  # Aligns with HSM_REQUESTS_TOPIC in
  # wallet-bff/src/infrastructure/adapters/outgoing/kafka/request_sender.rs
  name: hsm-requests
  labels:
    strimzi.io/cluster: access-kafka-cluster
spec:
  partitions: 50
  replicas: 2
  config:
    min.insync.replicas: 1
    retention.ms: 600000
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  # Aligns with STATE_INIT_REQUESTS_TOPIC in
  # wallet-bff/src/infrastructure/adapters/outgoing/kafka/request_sender.rs
  name: state-init-requests
  labels:
    strimzi.io/cluster: access-kafka-cluster
spec:
  partitions: 10
  replicas: 2
  config:
    min.insync.replicas: 1
    retention.ms: 600000
    cleanup.policy: delete
