apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kafka-tls
spec:
  secretName: kafka-tls
  privateKey:
    encoding: PKCS8
  issuerRef:
    name: mkcert
    kind: ClusterIssuer
  # Short-name SAN only so the cert is namespace-portable (each fork
  # deploys its own Kafka in its own namespace). The fully-qualified
  # in-cluster names embed the namespace and would need to be templated
  # per fork; nothing in the current stack relies on TLS to Kafka
  # (the wallet-bff uses the plaintext 9092 listener), so the short name
  # is sufficient for ad-hoc clients connecting via service DNS.
  dnsNames:
    - access-kafka-cluster-kafka-bootstrap
