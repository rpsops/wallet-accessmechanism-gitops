apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
spec:
  interval: 30m
  chart:
    spec:
      chart: valkey
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    sentinel:
      enabled: true

    replica:
      replicaCount: 3

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: monitoring
        interval: 30s
        labels:
          release: kube-prometheus-stack
