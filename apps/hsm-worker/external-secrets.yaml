---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hsm-worker-softhsm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: hsm-worker-softhsm
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: wallet-hsm/hsm-worker-softhsm
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hsm-worker-opaque
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: hsm-worker-opaque
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: wallet-hsm/hsm-worker-opaque
