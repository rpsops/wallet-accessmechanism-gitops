#
# Encrypted secrets for the hsm-worker. Generated with:
#
#   make k3s-seal-secrets   (in wallet-r2ps)
#
# SealedSecrets are namespace-scoped: the encrypted payload is bound to
# the sealed-secrets controller key for the specific cluster.
# Re-run after cluster rebuild or when .env files change.
#
# Source secrets (NOT committed) hold the contents of:
#   wallet-r2ps/.env.softhsm  -> Secret/hsm-worker-softhsm
#   wallet-r2ps/.env.opaque   -> Secret/hsm-worker-opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hsm-worker-softhsm
spec:
  encryptedData: {}
  template:
    metadata:
      name: hsm-worker-softhsm
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hsm-worker-opaque
spec:
  encryptedData: {}
  template:
    metadata:
      name: hsm-worker-opaque
    type: Opaque
