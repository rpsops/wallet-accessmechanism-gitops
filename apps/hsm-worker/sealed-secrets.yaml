#
# Encrypted secrets for the hsm-worker. Generated with kubeseal:
#
#   kubeseal --controller-name=sealed-secrets \
#     --controller-namespace=sealed-secrets \
#     --namespace=<your-fork-namespace> \
#     --format=yaml --secret-file=hsm-worker-softhsm.secret.yaml \
#     > hsm-worker-softhsm.sealed.yaml
#
# SealedSecrets are namespace-scoped: the encrypted payload is bound to
# the namespace passed to --namespace. Each fork must re-seal its own
# copies of these stubs (they ship empty so an unmodified fork still
# applies cleanly).
#
# Source secrets (NOT committed) hold the contents of:
#   wallet-r2ps/.env.softhsm  -> Secret/hsm-worker-softhsm
#   wallet-r2ps/.env.opaque   -> Secret/hsm-worker-opaque
#
# After sealing, replace the placeholder blocks below.
#
# TODO(seal): replace these stubs with real SealedSecret manifests.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hsm-worker-softhsm
spec:
  encryptedData: {}
  template:
    metadata:
      name: hsm-worker-softhsm
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hsm-worker-opaque
spec:
  encryptedData: {}
  template:
    metadata:
      name: hsm-worker-opaque
    type: Opaque
