#
# Top-level aggregator. Flux applies this with
# `targetNamespace: <fork-namespace>`, which rewrites every namespaced
# resource (including ServiceAccount subjects in ClusterRoleBindings)
# into that namespace. Listed in dependency-friendly order; ordering is
# best-effort because no `dependsOn` is used (Flux retries until the
# graph converges).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/kafka-cluster
  - apps/valkey
  - apps/kafbat
  - apps/kafbat-routes
  - apps/headlamp
  - apps/wallet-bff
  - apps/hsm-worker
